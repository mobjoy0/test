name: CI Prod

on:
  push:
    branches:
      - main

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read image tag
        id: tag
        run: echo "IMAGE_TAG=$(cat .image-tag)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull dev image
        run: docker pull ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Retag as prod
        run: |
          docker tag \
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Push prod image
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}