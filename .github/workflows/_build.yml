name: Build

on:
  workflow_call:
    inputs:
      mode:
        description: 'Build mode: pr | dev | main'
        type: string
        required: true
    outputs:
      sha-tag:
        description: 'The sha tag of the built/promoted image'
        value: ${{ jobs.build-pr.outputs.sha-tag || jobs.build-dev.outputs.sha-tag || jobs.build-main.outputs.sha-tag }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # PR MODE — build image, save as artifact named after the SHA, no push
  # ============================================================================
  build-pr:
    name: Build (PR)
    if: inputs.mode == 'pr'
    runs-on: ubuntu-latest
    outputs:
      sha-tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA tag
        id: vars
        run: echo "sha_tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_tag }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Compress image
        run: gzip /tmp/image.tar

      # Artifact name IS the sha tag 
      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.sha_tag }}
          path: /tmp/image.tar.gz
          retention-days: 7

      - name: Summary
        run: |
          echo "### Build (PR)" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ steps.vars.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed to GHCR | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`${{ steps.vars.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # DEV MODE — find artifact from PR run (name = sha tag), load, push to GHCR
  # ============================================================================
  build-dev:
    name: Build (dev push)
    if: inputs.mode == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    outputs:
      sha-tag: ${{ steps.find.outputs.sha_tag }}
    steps:
      # List artifacts from the latest successful PR run on this branch
      # to find the artifact whose name is the sha tag
      - name: Find sha tag from PR artifact
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '_pipeline.yml',
              event: 'pull_request',
              status: 'success',
              per_page: 5
            });

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });

              const artifact = artifacts.data.artifacts.find(a => a.name.startsWith('sha-'));
              if (artifact) {
                core.setOutput('sha_tag', artifact.name);
                core.setOutput('run_id', run.id);
                console.log(`Found artifact: ${artifact.name} from run ${run.id}`);
                return;
              }
            }
            core.setFailed('No sha artifact found in recent PR runs');

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.find.outputs.sha_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find.outputs.run_id }}

      - name: Load image
        run: |
          gunzip image.tar.gz
          docker load --input image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.find.outputs.sha_tag }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.find.outputs.sha_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

      # Re-upload artifact with sha tag name so main can find it
      - name: Re-upload sha artifact for main
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.sha_tag }}
          path: image.tar
          retention-days: 30

      - name: Summary
        run: |
          echo "### Build (dev push)" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ steps.find.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rebuilt | ❌ (loaded from artifact) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags pushed | \`${{ steps.find.outputs.sha_tag }}\`, \`dev\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # MAIN MODE — find sha artifact from latest dev push, pull from GHCR, retag
  # ============================================================================
  build-main:
    name: Build (main push)
    if: inputs.mode == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    outputs:
      sha-tag: ${{ steps.find.outputs.sha_tag }}
    steps:
      - name: Find sha tag from dev push artifact
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '_pipeline.yml',
              branch: 'dev',
              event: 'push',
              status: 'success',
              per_page: 5
            });

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });

              const artifact = artifacts.data.artifacts.find(a => a.name.startsWith('sha-'));
              if (artifact) {
                core.setOutput('sha_tag', artifact.name);
                console.log(`Found artifact: ${artifact.name} from run ${run.id}`);
                return;
              }
            }
            core.setFailed('No sha artifact found in recent dev push runs');

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.find.outputs.sha_tag }}

      - name: Push with main tag
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.find.outputs.sha_tag }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.find.outputs.sha_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

      - name: Summary
        run: |
          echo "### Build (main push)" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ steps.find.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rebuilt | ❌ (reused from dev) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags pushed | \`${{ steps.find.outputs.sha_tag }}\`, \`main\` |" >> $GITHUB_STEP_SUMMARY