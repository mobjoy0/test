name: Pipeline

# Flow:
#
#   PR feat/* → dev:
#   ┌─────────┐     ┌──────────────────────────────────────┐
#   │   CI    │────▶│  Build (pr mode)                     │
#   │lint+test│     │  build → compress → artifact: sha-*  │
#   └─────────┘     └──────────────────────────────────────┘
#
#   Push to dev (PR merged):
#   ┌──────────────────────────────────────────────────────┐
#   │  Build (dev mode)                                    │
#   │  find artifact by sha-* name from PR run             │
#   │  load → push to GHCR                                 │
#   │  tags: sha-abc1234 + dev                             │
#   │  re-upload artifact for main                         │
#   └──────────────────────────────────────────────────────┘
#
#   PR dev → main:
#   (skipped — already validated on feat/* PR)
#
#   Push to main (PR merged):
#   ┌──────────────────────────────────────────────────────┐
#   │  Build (main mode)                                   │
#   │  find sha-* artifact from latest dev push run        │
#   │  pull from GHCR → retag → push                      │
#   │  tags: sha-abc1234 + main                            │
#   │  no rebuild                                          │
#   └──────────────────────────────────────────────────────┘

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_ci.yml

  build:
    name: Build
    needs: [ci]
    if: |
      !cancelled() &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    uses: ./.github/workflows/_build.yml
    with:
      mode: >-
        ${{
          github.event_name == 'pull_request' && 'pr' ||
          github.ref == 'refs/heads/dev'      && 'dev' ||
          github.ref == 'refs/heads/main'     && 'main'
        }}
    permissions:
      contents: read
      packages: write
      actions: read